<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Координаты</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>

  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Unbounded:wght@300;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #11111a;
    --border: #1e1e30;
    --x: #ff4466;
    --y: #44ff88;
    --z: #448aff;
    --text: #e0e0f0;
    --muted: #555570;
    --accent: #ffffff;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-columns: 320px 1fr;
    height: 100vh;
  }

  #panel {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 24px;
    gap: 32px;
    overflow-y: auto;
  }

  @media (max-width: 640px) {
    html, body { overflow: hidden; }

    #app {
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      height: 100dvh;
    }

    #panel {
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 16px;
      gap: 16px;
      overflow-y: auto;
      max-height: 44vh;
    }

    .coords { gap: 14px; }

    .slider-label { font-size: 8px; }

    input[type=range] { height: 3px; }

    input[type=range]::-webkit-slider-thumb {
      width: 20px; height: 20px;
    }

    input[type=number] {
      width: 60px;
      font-size: 12px;
      padding: 8px 6px;
    }

    .share-url { font-size: 9px; }

    .copy-btn { font-size: 10px; padding: 10px 14px; }

    .canvas-hint { font-size: 9px; bottom: 10px; right: 12px; }
  }

  .panel-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .logo {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .logo h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  
  .coords {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .coord-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .coord-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .slider-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    white-space: nowrap;
    min-width: 0;
    flex-shrink: 0;
  }

  .slider-label.neg { opacity: 0.4; }

  
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range].x { --c: var(--x); }
  input[type=range].y { --c: var(--y); }
  input[type=range].z { --c: var(--z); }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #ffffff;
    box-shadow: 0 0 8px rgba(255,255,255,0.6);
    cursor: grab;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.3); }
  input[type=range]:focus::-webkit-slider-thumb { box-shadow: 0 0 14px rgba(255,255,255,0.9); }

  
  input[type=number] {
    width: 72px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 8px;
    border-radius: 4px;
    text-align: right;
    outline: none;
    transition: border-color 0.2s;
    -moz-appearance: textfield;
  }
  input[type=number]::-webkit-inner-spin-button { display: none; }
  input[type=number]:focus { border-color: var(--muted); }
  input[type=number].x:focus { border-color: var(--x); }
  input[type=number].y:focus { border-color: var(--y); }
  input[type=number].z:focus { border-color: var(--z); }

  
  .readout {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .readout-line {
    font-size: 12px;
    display: flex;
    justify-content: space-between;
  }
  .readout-line span:first-child { color: var(--muted); }
  .readout-val { font-weight: 600; color: var(--accent); }

  
  .distance {
    margin-top: 4px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    font-size: 11px;
  }
  .distance span:first-child { color: var(--muted); }
  .distance-val { color: #ffcc44; font-weight: 600; }

  
  .share-section { display: flex; flex-direction: column; gap: 10px; }

  .share-url {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 10px;
    color: var(--muted);
    word-break: break-all;
    line-height: 1.5;
    min-height: 40px;
  }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 8px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
    text-transform: uppercase;
  }
  .copy-btn:hover { background: var(--border); }
  .copy-btn.copied { border-color: var(--y); color: var(--y); }

  
  #canvas-wrap {
    position: relative;
    overflow: hidden;
  }
  #three-canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  .canvas-hint {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    pointer-events: none;
  }

  
  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">
  
  <div id="panel">
    <div class="coords" id="coords"></div>

    
    <div class="share-section">
      <div class="panel-title">Поделиться</div>
      <div class="share-url" id="share-url"></div>
      <button class="copy-btn" id="copy-btn">Скопировать ссылку</button>
    </div>
  </div>

  
  <div id="canvas-wrap">
    <canvas id="three-canvas"></canvas>
    <div class="canvas-hint">ЛКМ / палец — вращение · Колесо / щипок — зум</div>
  </div>
</div>

<script>

const AXES = [
  {
    id: 'x',
    neg: { label: 'ПСИХОЗ' },
    pos: { label: 'НЕВРОЗ' },
    rgb: 'R',
  },
  {
    id: 'y',
    neg: { label: 'КРИНЖ' },
    pos: { label: 'ДРИП' },
    rgb: 'G',
  },
  {
    id: 'z',
    neg: { label: 'СУВЕРЕННОСТЬ' },
    pos: { label: 'ПРЕСТИЖ' },
    rgb: 'B',
  },
];

const state = Object.fromEntries(AXES.map(a => [a.id, 0]));

const wrap = document.getElementById('canvas-wrap');
const canvas = document.getElementById('three-canvas');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setClearColor(0x0a0a0f, 1);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 2000);
camera.position.set(180, 130, 180);
camera.lookAt(0, 0, 0);

function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

const S = 100; 
const N = 10;  

function norm(v) { return (v + S) / (2 * S); } 

function makeGridFace(uAxis, vAxis, wVal) {
  const positions = [];
  const colors = [];
  const wAxis = 3 - uAxis - vAxis; 

  function pushVert(u, v) {
    const p = [0, 0, 0];
    p[uAxis] = u; p[vAxis] = v; p[wAxis] = wVal;
    positions.push(...p);
    
    colors.push(norm(p[0]), norm(p[1]), norm(p[2]));
  }

  
  for (let j = 0; j <= N; j++) {
    const v = -S + (2 * S / N) * j;
    for (let i = 0; i < N; i++) {
      const u0 = -S + (2 * S / N) * i;
      const u1 = -S + (2 * S / N) * (i + 1);
      pushVert(u0, v);
      pushVert(u1, v);
    }
  }
  
  for (let i = 0; i <= N; i++) {
    const u = -S + (2 * S / N) * i;
    for (let j = 0; j < N; j++) {
      const v0 = -S + (2 * S / N) * j;
      const v1 = -S + (2 * S / N) * (j + 1);
      pushVert(u, v0);
      pushVert(u, v1);
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.Float32BufferAttribute(colors, 3));
  const mat = new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.85 });
  return new THREE.LineSegments(geo, mat);
}

scene.add(makeGridFace(0, 2, -S));

scene.add(makeGridFace(0, 2,  S));

scene.add(makeGridFace(1, 2, -S));

scene.add(makeGridFace(1, 2,  S));

scene.add(makeGridFace(0, 1, -S));

scene.add(makeGridFace(0, 1,  S));

function makeLabel(text, pos, color) {
  const padding = 20;
  const fontSize = 28;
  
  const tmp = document.createElement('canvas');
  const tmpCtx = tmp.getContext('2d');
  tmpCtx.font = `bold ${fontSize}px "JetBrains Mono", monospace`;
  const textW = tmpCtx.measureText(text).width;

  const cw = Math.ceil(textW) + padding * 2;
  const ch = fontSize + padding * 2;
  const c = document.createElement('canvas');
  c.width = cw; c.height = ch;
  const ctx = c.getContext('2d');

  
  ctx.shadowColor = color;
  ctx.shadowBlur = 18;
  ctx.fillStyle = color;
  ctx.font = `bold ${fontSize}px "JetBrains Mono", monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  ctx.fillText(text, cw / 2, ch / 2);
  ctx.fillText(text, cw / 2, ch / 2);

  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
  const sprite = new THREE.Sprite(mat);
  
  const scale = 0.55;
  sprite.scale.set(cw * scale, ch * scale, 1);
  sprite.position.copy(pos);
  return sprite;
}

const axisVectors = [
  new THREE.Vector3(1, 0, 0),
  new THREE.Vector3(0, 1, 0),
  new THREE.Vector3(0, 0, 1),
];
AXES.forEach((axis, i) => {
  const dir = axisVectors[i];
  scene.add(makeLabel(axis.pos.label, dir.clone().multiplyScalar(128), '#ffffff'));
  scene.add(makeLabel(axis.neg.label, dir.clone().multiplyScalar(-128), '#ffffff'));
});

const originGeo = new THREE.SphereGeometry(1.5, 16, 16);
const originMat = new THREE.MeshBasicMaterial({ color: 0x333355 });
scene.add(new THREE.Mesh(originGeo, originMat));

const pointGeo = new THREE.SphereGeometry(3, 32, 32);
const pointMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
const pointMesh = new THREE.Mesh(pointGeo, pointMat);
scene.add(pointMesh);

function makeGlow(color) {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64,64,0,64,64,64);
  g.addColorStop(0, color + 'cc');
  g.addColorStop(0.4, color + '44');
  g.addColorStop(1, color + '00');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 128, 128);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
  const s = new THREE.Sprite(mat);
  s.scale.set(30, 30, 1);
  return s;
}
const glow = makeGlow('#ffffff');
scene.add(glow);

const lineGeo = new THREE.BufferGeometry().setFromPoints([
  new THREE.Vector3(0,0,0),
  new THREE.Vector3(0,0,0)
]);
const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.25 });
const line = new THREE.Line(lineGeo, lineMat);
scene.add(line);

function makeProjectionLine(color) {
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,0)
  ]);
  const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.35 });
  return new THREE.Line(geo, mat);
}
const projX = makeProjectionLine(0xff4466);
const projY = makeProjectionLine(0x44ff88);
const projZ = makeProjectionLine(0x448aff);
scene.add(projX, projY, projZ);

function setLinePoints(line, a, b) {
  const pos = line.geometry.attributes.position;
  pos.setXYZ(0, a.x, a.y, a.z);
  pos.setXYZ(1, b.x, b.y, b.z);
  pos.needsUpdate = true;
  line.geometry.computeBoundingSphere();
}

function updateScene() {
  const { x, y, z } = state;
  pointMesh.position.set(x, y, z);
  glow.position.set(x, y, z);
  setLinePoints(line, new THREE.Vector3(0,0,0), new THREE.Vector3(x,y,z));
  setLinePoints(projX, new THREE.Vector3(0,y,z), new THREE.Vector3(x,y,z));
  setLinePoints(projY, new THREE.Vector3(x,0,z), new THREE.Vector3(x,y,z));
  setLinePoints(projZ, new THREE.Vector3(x,y,0), new THREE.Vector3(x,y,z));
}

let orbit = { active: false, button: -1, lastX: 0, lastY: 0,
              theta: Math.PI/4, phi: Math.PI/3, radius: 480 };

function applyOrbit() {
  orbit.phi = Math.max(0.05, Math.min(Math.PI - 0.05, orbit.phi));
  camera.position.set(
    orbit.radius * Math.sin(orbit.phi) * Math.sin(orbit.theta),
    orbit.radius * Math.cos(orbit.phi),
    orbit.radius * Math.sin(orbit.phi) * Math.cos(orbit.theta)
  );
  camera.lookAt(0, 0, 0);
}
applyOrbit();

canvas.addEventListener('mousedown', e => {
  orbit.active = true; orbit.button = e.button;
  orbit.lastX = e.clientX; orbit.lastY = e.clientY;
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if (!orbit.active) return;
  const dx = e.clientX - orbit.lastX;
  const dy = e.clientY - orbit.lastY;
  orbit.lastX = e.clientX; orbit.lastY = e.clientY;
  if (orbit.button === 0) {
    orbit.theta -= dx * 0.008;
    orbit.phi   += dy * 0.008;
  }
  applyOrbit();
});
window.addEventListener('mouseup', () => { orbit.active = false; });
canvas.addEventListener('wheel', e => {
  orbit.radius = Math.max(80, Math.min(900, orbit.radius + e.deltaY * 0.5));
  applyOrbit();
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    orbit.active = true;
    orbit.lastX = e.touches[0].clientX;
    orbit.lastY = e.touches[0].clientY;
  } else if (e.touches.length === 2) {
    orbit.pinchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && orbit.active) {
    const dx = e.touches[0].clientX - orbit.lastX;
    const dy = e.touches[0].clientY - orbit.lastY;
    orbit.lastX = e.touches[0].clientX;
    orbit.lastY = e.touches[0].clientY;
    orbit.theta -= dx * 0.008;
    orbit.phi   += dy * 0.008;
    applyOrbit();
  } else if (e.touches.length === 2) {
    const dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    orbit.radius = Math.max(80, Math.min(900, orbit.radius - (dist - orbit.pinchDist) * 1.5));
    orbit.pinchDist = dist;
    applyOrbit();
  }
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length === 0) orbit.active = false;
}, { passive: false });

let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.016;
  
  glow.scale.setScalar(28 + 4 * Math.sin(t * 2));
  renderer.render(scene, camera);
}
animate();

const coordsEl = document.getElementById('coords');
AXES.forEach(axis => {
  const row = document.createElement('div');
  row.className = 'coord-row';
  row.innerHTML = `
    <div class="coord-controls">
      <span class="slider-label neg">${axis.neg.label}</span>
      <input type="range" id="s${axis.id}" min="-100" max="100" step="0.1" value="0">
      <span class="slider-label">${axis.pos.label}</span>
      <input type="number" id="n${axis.id}" min="-100" max="100" step="0.1" value="0">
    </div>`;
  coordsEl.appendChild(row);
});

function clamp(v) { return Math.max(-100, Math.min(100, v)); }
function round(v) { return Math.round(v * 10) / 10; }

function syncUI() {
  AXES.forEach(axis => {
    const v = round(state[axis.id]);
    document.getElementById('s' + axis.id).value = v;
    document.getElementById('n' + axis.id).value = v;
  });
  updateScene();
  updateURL();
  updateShareDisplay();
}

AXES.forEach(axis => {
  document.getElementById('s' + axis.id).addEventListener('input', e => {
    state[axis.id] = clamp(parseFloat(e.target.value) || 0);
    syncUI();
  });
  document.getElementById('n' + axis.id).addEventListener('input', e => {
    const v = clamp(parseFloat(e.target.value) || 0);
    state[axis.id] = v;
    document.getElementById('s' + axis.id).value = v;
    updateScene();
    updateURL();
    updateShareDisplay();
  });
  document.getElementById('n' + axis.id).addEventListener('change', e => {
    let v = parseFloat(e.target.value);
    if (isNaN(v)) v = 0;
    state[axis.id] = clamp(v);
    syncUI();
  });
});

function updateURL() {
  const p = new URLSearchParams();
  AXES.forEach(axis => p.set(axis.id, round(state[axis.id])));
  history.replaceState(null, '', `${location.pathname}?${p.toString()}`);
}

function updateShareDisplay() {
  const p = new URLSearchParams();
  AXES.forEach(axis => p.set(axis.id, round(state[axis.id])));
  document.getElementById('share-url').textContent = `${location.origin}${location.pathname}?${p.toString()}`;
}

function loadFromURL() {
  const p = new URLSearchParams(location.search);
  AXES.forEach(axis => {
    const v = parseFloat(p.get(axis.id));
    if (!isNaN(v)) state[axis.id] = clamp(round(v));
  });
}

document.getElementById('copy-btn').addEventListener('click', () => {
  const p = new URLSearchParams();
  axes.forEach(a => p.set(a, round(state[a])));
  const url = `${location.origin}${location.pathname}?${p.toString()}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Скопировано';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Скопировать ссылку';
      btn.classList.remove('copied');
    }, 2000);
  });
});

loadFromURL();
syncUI();
</script>
</body>
</html>
